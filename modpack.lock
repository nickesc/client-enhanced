          "name": "3.0.0+1.21.11",
          "version_number": "3.0.0+1.21.11",
          "changelog": "## Features\r\n\r\n - Added support for NeoForge\r\n - Added support for Sodium `0.6.0-beta` ([#30](https://github.com/Kira-NT/cubes-without-borders/issues/30))\r\n - Implemented a configuration screen\r\n - Added a simpler way to access the `Pause On Lost Focus` option through the said configuration screen ([#35](https://github.com/Kira-NT/cubes-without-borders/issues/35))\r\n - Introduced software scaling to replace the screen resolution setting when it's unavailable; e.g., on macOS, Linux, or when the window is in borderless fullscreen mode ([#25](https://github.com/Kira-NT/cubes-without-borders/issues/25))\r\n - Enhanced fullscreen settings on macOS to better align with expected borderless fullscreen capabilities ([#23](https://github.com/Kira-NT/cubes-without-borders/issues/23))\r\n\r\n\r\n## Fixes\r\n\r\n - Reverted the default borderless fullscreen mode on Windows to `windows:windowed` ([#14](https://github.com/Kira-NT/cubes-without-borders/issues/14), [#21](https://github.com/Kira-NT/cubes-without-borders/issues/21), [#22](https://github.com/Kira-NT/cubes-without-borders/issues/22), [#27](https://github.com/Kira-NT/cubes-without-borders/issues/27), [#28](https://github.com/Kira-NT/cubes-without-borders/issues/28))\r\n\r\n\r\n## New Contributors\r\n\r\n - @Radk6 made their first contribution in [#26](https://github.com/Kira-NT/cubes-without-borders/pull/26)\r\n - @301haru made their first contribution in [#32](https://github.com/Kira-NT/cubes-without-borders/pull/32)\r\n - @BluSpring made their first contribution in [#87](https://github.com/Kira-NT/cubes-without-borders/pull/87)\r\n\r\n**Full Changelog**: [`3.0.0+1.21.5...3.0.0+1.21.11`](https://github.com/Kira-NT/cubes-without-borders/commits/3.0.0+1.21.11)",
