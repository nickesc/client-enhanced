          "author_id": "Ax4CDqep",
          "featured": false,
          "name": "Nautilus3D V2.6",
          "version_number": "V2.6",
          "changelog": "## Summary\n\n - [+] Added Mjölnir\n - [+] Added pale oak leaves to respackopts (#59)\n - [-] Fixed various item models in 1.21.11\n - [-] Slightly updated furnace & smoker models\n - [-] Restructured texture directories\n\n### Mjölnir!\nWhen renaming the mace to \"Mjölnir\", it will show a special model.\n![Mjolnir](https://private-user-images.githubusercontent.com/78741736/538702503-27460b3c-dd67-4007-a445-cdb3f8f158c0.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..sW-2yXGVf1op8v5nZdBuzq5XPsVU2pYV_JZOyCkMW-U)\nBut be careful! Mjölnir can only be handled by those who are worthy :D\n\n\n### Model fixes for 1.21.11!\nItem-models for the mace, spyglass, trident and lanterns are now displaying correctly in 1.21.11.\n\n### Internal directory changes\nDue to the way newer Minecraft versions handle texture loading, some texture directories have changed. Lots of model files had to be updated to use the new file paths.\nAs always, if you encounter missing textures, or any other bugs, feel free to report it on our [GitHub](https://github.com/FabianMPunkt/Nautilus3D/issues)!\n\nThis change also helps future development, and ensures better compatibility with other resource packs and mods.\n\n### Known Issues:\n\nSome parts of the lantern item-models are not rendering properly in 26.1 snapshot 4. As of right now I have no idea why that is.\n\nThe inside of the ender chest is currently broken and only displays a black texture.\nI don't have the slightes clue why that is the case since it worked just fine in the previous release of EMF / ETF.\n\n**Full Changelog**: https://github.com/FabianMPunkt/Nautilus3D/compare/V2.5...V2.6",
