          "name": "[Fabric 1.21.11] UniLib v1.2.1",
          "version_number": "1.2.1+1.21.11-fabric",
          "changelog": "# UniLib Changes\n\n## v1.2.1 (03/02/2026)\n\n_A Detailed Changelog from the last release is\navailable [here](https://gitlab.com/CDAGaming/UniLib/-/compare/release%2Fv1.2.0...release%2Fv1.2.1)_\n\nSee the Mod Description or [README](https://gitlab.com/CDAGaming/UniLib) for more info regarding the mod.\n\n### Changes\n\n* (Backend) Updated Build Dependencies (Please see the appropriate repositories for changes)\n    * Unimined (`1.3.14` -> `1.0.5+1.4.2-SNAPSHOT`)\n    * JVMDowngrader (`1.2.2` -> `1.3.6`)\n    * Spotless (`8.0.0` -> `8.2.1`)\n    * Shadow (`9.2.2` -> `9.3.1`)\n    * SpotBugs Annotations (`4.9.6` -> `4.9.8`)\n    * ASM (`9.8` -> `9.9.1`)\n    * Fabric Loader (`0.17.2` -> `0.18.4`)\n    * UniCore (`1.3.3` -> `1.3.4`)\n    * LenniReflect (`1.5.0` -> `1.6.2`)\n    * ClassGraph (`4.8.181` -> `4.8.184`)\n    * ImageIO (`3.12.0` -> `3.13.0`)\n    * Gradle (`8.14.3` -> `9.2.1`)\n\n___\n\n### More Information\n\n#### Known Issues\n\nDespite compatibility often being ensured between versions,\ncaution is advised to ensure the best experience, while also baring in mind that features can be adjusted, removed, or\nadded/iterated upon between releases.\n\nPlease refer to the Mod Description or [README](https://gitlab.com/CDAGaming/UniLib) to view more info relating\nto known issues.\n\n#### Snapshot Build Info\n\nSome Versions of this Mod are for Minecraft Snapshots or Experimental Versions, and as such, caution should be noted.\n\nAny Snapshot Build released will be marked as **ALPHA** to match its Snapshot Status depending on tests done before\nrelease\nand issues found.\n\nSnapshot Builds, depending on circumstances, may also contain changes for a future version of the mod, and will be noted\nas so if this is the case with the `-Staging` label.\n",
