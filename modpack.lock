          "name": "Lithium 0.21.4 for Fabric",
          "version_number": "mc1.21.11-0.21.4-fabric",
          "changelog": "Lithium 0.21.4 for Minecraft 1.21.11 adds several optimizations and fixes.\n\nMake sure to take a backup of your world before using the mod and please report any bugs and mod compatibility issues at the [issue tracker](https://github.com/CaffeineMC/lithium-fabric/issues). You can check the [description of each optimization](https://github.com/CaffeineMC/lithium/blob/mc1.21.11-0.21.4/lithium-mixin-config.md) and how to disable it when encountering a problem.\n\n## Additions\n- Optimize nitwit jobsite search (Thanks to jcw780)\n- Optimize explosions by caching block states (Based on PR by pwouik)\n- Reduce iteration and allocation of block to entity effects\n- Add missing palette crash recovery attempt\n- Use cached false values for fluid hole search\n\n## Fixes\n- Fix negative indices caused by byte to int cast (crash with modded fluids https://github.com/CaffeineMC/lithium/issues/719)",
