          "changelog": "## What's Changed\r\n* rotation lock for other players option by @viciscat in https://github.com/tr7zw/NotEnoughAnimations/pull/317\r\n* Fix gamecrash with easynpc + scabbard sword*\r\n* Fix arms swinging not working during freezing/burning animation. Fix [#316](https://github.com/tr7zw/NotEnoughAnimations/issues/316)\r\n\r\n\\* Reminder, this feature is deprecated and is removed in future versions\r\n\r\n**Full Changelog**: https://github.com/tr7zw/NotEnoughAnimations/compare/1.11.2...1.11.3\n",
