          "featured": false,
          "name": "journeymap-1.21.11-6.0.0-beta.60+fabric",
          "version_number": "1.21.11-6.0.0-beta.60+fabric",
          "changelog": "<!--\n  ~ JourneyMap Mod <journeymap.info> for Minecraft\n  ~ Copyright (c) 2011-2018  Techbrew Interactive, LLC.  All Rights Reserved.\n  -->\n\n<h1>JourneyMap 1.21.11-6.0.0-beta.60 for Minecraft 1.21.11</h1>\n<p><strong>Requirements:</strong></p>\n<ul>\n    <li>Java 21</li>\n    <li>Minecraft 1.21.11</li>\n    <li>Fabric 0.139.4+1.21.11</li>\n</ul>\n<p><strong>General Information:</strong></p>\n<ul>\n    <li>See <a href=\"http://journeymap.info/\">http://journeymap.info</a> for information about how to install and use\n        this mod, rules about inclusion in modpacks, translation, etc.\n    </li>\n    <li>See <a href=\"http://journeymap.info/Support\">http://journeymap.info</a>&nbsp;for information on getting\n        technical support.\n    </li>\n    <li>Implements <a href=\"https://github.com/TeamJM/journeymap-api\">JourneyMap API v2.0.0</a></li>\n</ul>\n<p><strong>CHANGELOG (2026-03-25-10:41:22):</strong></p>\n\n<p>New in 1.21.11-6.0.0-beta.60</p>\n<ul>\n    <li>Added: Zoomout uses LOD to significantly reduce memory usage on maps, very noticeable on huge maps.</li>\n    <li>Added: Pokemon Icon Scaling</li>\n    <li>Added: Option to hide the background rectangle behind waypoint beacon labels</li>\n    <li>Added: Advanced option to disable number overlay on minimap preset switch</li>\n    <li>Added: Waypoint Beacon option, autohide label vertically. default:true</li>\n    <li>Changed: handle stb-image-resize issues between lwjgl 3.3.3 and 3.3.6</li>\n    <li>Changed: map rendering speed increased, map updates much faster now!</li>\n    <li>Changed: API requestMapTile updated to remove modId checks</li>\n    <li>Changed: Player names switched to Display names</li>\n    <li>Updated: Significant memory reduction on top of LOD memory reductions</li>\n    <li>Updated: Nether surface is brighter and removed night map type from nether</li>\n    <li>Fixed: Some image tiles getting corrupted during updates on force exit</li>\n    <li>Fixed: Mod compat with OkZoomer</li>\n    <li>Fixed: Map Filter shaders.</li>\n    <li>Fixed: Radio Buttons not showing up in Grid Editor or Waypoint Coordinate layout editor</li>\n    <li>Fixed: world close log spam</li>\n    <li>Fixed: Minecraft Days info display not respecting dodaylightcycle gamerule or /time set</li>\n    <li>Fixed: Waypoint editor ignoring first keypress</li>\n    <li>Fixed: Import dialog blocking the game thread, causing disconnects on servers and hitching in singleplayer</li>\n    <li>Fixed: \"What's New\" entries duplicating each time the About screen is revisited after navigating to a feature</li>\n    <li>Fixed: Player icons and names not displaying on minimap for players with non-English characters in their name</li>\n    <li>Fixed: Waypoint folders not refreshing in manager after import until reconnect</li>\n    <li>Fixed: Getting correct blockentity colors</li>\n    <li>Fixed: After using /transfer, JourneyMap now switches to the correct map data directory for the new server</li>\n    <li>Fixed: CaveSurface rendering no longer starting as black</li>\n</ul>\n",
