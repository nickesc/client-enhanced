          "changelog": "Updated for 1.21.11 with a few changes!\n\n**Improved Discovery**\n  - resource and datapack sounds now appearing again [#22](https://github.com/BVengo/sound-controller/issues/22) \n  - more complex mods such as Presence Footsteps now modifiable [#13](https://github.com/BVengo/sound-controller/issues/13) \n\n**Support Refresh**\nVolumes will be reloaded when resource packs get refreshed (`F3-T`). \n\nThis is useful not just for when you add new resource packs, but also when you modify your config file directly. Previously this would require a restart, however now you can simply reload your resource packs.\n\n**Stop Playback**\nThe config allows for testing your audio volumes, but the playback always played the full sound. This was annoying for long-running sounds (e.g. music). You can now press the button a second time to stop the sound. [#21](https://github.com/BVengo/sound-controller/issues/21)\n\n---\n\nUnfortunately, the ability to raise volumes over `100%` will be removed again in a later update after discovering that it did not, and *can not* work as intended. See [#34](https://github.com/BVengo/sound-controller/issues/34) for more details about this.\n\nInstead, it will be replaced with a button allowing you to ignore the category volume, per sound.",
