          "changelog": "This release completes the majority of the spawn eggs and buckets. It also fixes a few bugs, and changes how buckets/spawn eggs that don't have all components defined are represented.\n\nWith the help of the pack restructure from @un_pogaz, the process of disabling most texture/model changes has been simplified. If you wish to disable a sub-pack, simply rename or delete the corresponding sub-folder in the pack.\nFor example to disable visual paintings, open the zip folder and rename `paintings` to `paintings_disabled` (or delete it).\nThis process will hopefully be streamlined further in the future.\n\nAdditionally, this release adds support for Polytone Creative Tab Modifiers, allowing you to take the spawn eggs that you want directly out of the creative inventory.\nThis feature requires the [Polytone](https://modrinth.com/mod/polytone) mod. Alternatively, this mod is included in the well-regarded modpack [Fabulously Optimized](https://modrinth.com/mod/fabulously-optimized).\n\nVisual blocks was temporarily removed in order to keep the pack more manageable. If you still wish to use Visual Blocks but would also like the new features, you may use both this version and version 1.0 simultaneously.\n\n### Changes\n- Items\n    - Generic spawn eggs that may spawn multiple variants now have a \"+X\" in the top right, where X is the number of other variants the spawn egg can spawn\n    - Generic buckets that may spawn multiple variants now have a \"+X\" in the bottom right, where X is the number of other variants the bucket can place\n    - Compass\n        - Lodestone tracker will now have a yellow needle and a warmer tint\n    - Axolotl Bucket\n        - Cooldown textures now match adult textures (currently unused)\n    - Goat Horn\n        - Added new models for when blowing the goat horn\n    - Pig Spawn Egg\n        - Variant\n            - Cold (decrease edge contrast)\n    - Villager Spawn Egg\n        - Variant (increase edge contrast)\n            - Desert\n            - Jungle\n            - Snow\n            - Taiga\n    - Zombie Villager Spawn Egg\n        - Variant (increase edge contrast)\n            - Desert\n            - Jungle\n            - Snow\n            - Taiga\n- Blocks\n    - Temporarily removed\n    \n### Additions\n- Items\n    - Debug Stick\n    - Bow\n        - Context Entity\n            - Bogged (poison)\n            - Stray (slowness)\n            - Wither Skeleton (flaming)\n    - Bogged Spawn Egg\n        - Sheared\n    - Cat Spawn Egg\n        - Variant\n    - Chicken Spawn Egg\n        - Variant\n    - Cow Spawn Egg\n        - Variant\n    - Creeper Spawn Egg\n        - Powered (Charged)\n    - Evoker Spawn Egg\n        - ID (Illusioner)\n    - Fox Spawn Egg\n        - Variant\n    - Frog Spawn Egg\n        - Variant\n    - Goat Spawn Egg\n        - HasLeftHorn\n        - HasRightHorn\n        - IsScreamingGoat\n    - Horse Spawn Egg\n        - Variant\n    - Llama Spawn Egg\n        - Variant\n    - Magma Cube Spawn Egg\n        - Size\n    - Mooshroom Spawn Egg\n        - Variant\n    - Panda Spawn Egg\n        - MainGene & HiddenGene (waiting for components to separate)\n    - Rabbit Spawn Egg\n        - Variant\n        - Name (Toast)\n    - Salmon Spawn Egg\n        - Size\n    - Sheep Spawn Egg\n        - Color\n    - Shulker Spawn Egg\n        - Color\n    - Slime Spawn Egg\n        - Size\n    - Snow Golem Spawn Egg\n        - Pumpkin\n    - Trader Llama Spawn Egg\n        - Variant\n    - Wolf Spawn Egg\n        - Variant\n        - Sound Variant\n    - Zombie Spawn Egg\n        - ID (Giant)\n- Translations\n    - English, United States (en_us)\n    - Turkish, Turkey (tr_tr, thanks @feycional)\n    - LOLCAT, Kingdom of Cats (lol_us, thanks @pikuler)\n- Polytone\n    - Creative Tab Modifiers\n        - Spawn Eggs\n            - Axolotl Spawn Egg \n                - Lucy\n                - Wild\n                - Gold\n                - Cyan\n                - Blue\n            - Bogged Spawn Egg\n                - Sheared\n            - Cat Spawn Egg\n                - Black\n                - Tuxedo\n                - British Shorthair\n                - Calico\n                - Jellie\n                - Persian\n                - Ragdoll\n                - Red\n                - Siamese\n                - Tabby\n                - White\n            - Chicken Spawn Egg\n                - Cold\n                - Temperate\n                - Warm\n            - Cow Spawn Egg\n                - Cold\n                - Temperate\n                - Warm\n            - Creeper Spawn Egg\n                - Charged\n            - Evoker Spawn Egg\n                - Illusioner\n            - Fox Spawn Egg\n                - Red\n                - Snow\n            - Frog Spawn Egg\n                - Cold\n                - Temperate\n                - Warm\n            - Goat Spawn Egg\n                - Regular, Has Left Horn, Has Right Horn\n                - Regular, Has Left Horn, Missing Right Horn\n                - Regular, Missing Left Horn, Has Right Horn\n                - Regular, Missing Left Horn, Missing Right Horn\n                - Screaming, Has Left Horn, Has Right Horn\n                - Screaming, Has Left Horn, Missing Right Horn\n                - Screaming, Missing Left Horn, Has Right Horn\n                - Screaming, Missing Left Horn, Missing Right Horn\n            - Horse Spawn Egg\n                - White\n                - Creamy\n                - Chestnut\n                - Brown\n                - Black\n                - Gray\n                - Dark Brown\n            - Llama Spawn Egg\n                - Creamy\n                - White\n                - Brown\n                - Gray\n            - Magma Cube Spawn Egg\n                - Small\n                - Medium\n                - Medium-Large\n                - Large\n                - Extra Large\n            - Mooshroom Spawn Egg\n                - Brown\n            - Panda Spawn Egg\n                - Normal\n                - Aggressive\n                - Weak\n                - Lazy\n                - Worried\n                - Playful\n                - Brown\n            - Parrot Spawn Egg\n                - Red\n                - Blue\n                - Green\n                - Cyan\n                - Gray\n            - Pig Spawn Egg\n                - Cold\n                - Temperate\n                - Warm\n            - Rabbit Spawn Egg\n                - Brown\n                - Albino\n                - Black\n                - Black and White\n                - Gold\n                - Salt and Pepper\n                - The Killer Bunny\n            - Salmon Spawn Egg\n                - Small\n                - Medium\n                - Large\n            - Sheep Spawn Egg\n                - White\n                - Light Gray\n                - Gray\n                - Black\n                - Brown\n                - Red\n                - Orange\n                - Yellow\n                - Lime\n                - Green\n                - Cyan\n                - Light Blue\n                - Blue\n                - Purple\n                - Magenta\n                - Pink\n            - Shulker Spawn Egg\n                - White\n                - Light Gray\n                - Gray\n                - Black\n                - Brown\n                - Red\n                - Orange\n                - Yellow\n                - Lime\n                - Green\n                - Cyan\n                - Light Blue\n                - Blue\n                - Purple\n                - Magenta\n                - Pink\n            - Slime Spawn Egg\n                - Small\n                - Medium\n                - Medium-Large\n                - Large\n                - Extra Large\n            - Snow Golem Spawn Egg\n                - Sheared\n            - Trader Llama Spawn Egg\n             