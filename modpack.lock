          "changelog": "## Hotfix 1.11.1\r\n* Fix Smithing Table crashing the game #307 by @elenawinters in https://github.com/tr7zw/NotEnoughAnimations/pull/309\r\n\r\n## What's changed\r\n* Add 1.21.11 Fabric/Neoforge support\r\n* Added option to invert the hold up config, in case you want to hold up everything *except* certain items\r\n* Added support for the new Spears\r\n* Moved the map item list into the config. This only applies the holding animation, it will not magically render non-vanilla maps in the world\r\n* Switched build system from Preprocessor to Stonecutter\r\n\r\n**Full Changelog**: https://github.com/tr7zw/NotEnoughAnimations/compare/1.10.6...1.11.1\n",
