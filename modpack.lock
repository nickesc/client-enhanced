          "name": "JourneyMap Waypoint Syncing (JMWS) 1.2.3-1.21.11",
          "version_number": "1.2.3-1.21.11",
          "changelog": "# 1.2.3 Changelog\n\n## New\n\nNo new features. Very minor bug fix.\n\n## Bug fixes\n\n- Fixed an issue where Waystones waypoints would duplicate / not show at all.\n    - Resolves https://github.com/NavidRohim/JMWS/issues/5\n- Fixed an issue where, if using the Flashback mod, the client would crash when playing back a recording.\n    - Resolves https://github.com/NavidRohim/JMWS/issues/7\n- JMWS no longer syncs objects belonging to other plugins. Only player-made objects.\n    - To any normal user, this change does nothing.\n\n## Bugs that I am aware of\n\n- When using fullscreen map, you cannot delete synced objects with the dropdown menu.\n  - This is a JourneyMap problem and will be fixed in the future.\n\nI realize the config screen inside JourneyMap is very messy. JourneyMap is supposed to have categories so it looks much cleaner, but currently they are broken.\nWhen they are fixed in JourneyMap, so will the config screen in my mod (E.g. I won't have to release a bug fix)\n\n### Server\n\nServer version is 1.102 (Up from 1.101, minor changes) updating is recommended.",
