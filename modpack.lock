          "author_id": "Ax4CDqep",
          "featured": false,
          "name": "V2.5",
          "version_number": "V2.5",
          "changelog": "## Summary\n\n - [+] Added diagonal rails\n - [+] Added more respackopts\n - [+] Added more vegetation\n\n### Diagonal Rails!\nDiagonal Rails are now an optional part of Nautilus3D. Thanks to [Toria](https://github.com/ninetailedtori) for the suggestion! (#47)\n![Rails](https://private-user-images.githubusercontent.com/78741736/528954709-4277ef3f-f963-4550-a0ea-221c4ef224c2.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..PTHBUkvPcifaUewUedug_LM1qpKha7zbDxwrAV87P7I)\n[Respackopts](https://modrinth.com/mod/respackopts) is required to toggle between curved and diagoal rail corners. By default, it will show curved corners.\n![options](https://private-user-images.githubusercontent.com/78741736/528954405-1688c890-549f-4823-81ec-66d340e607be.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..p0hOGxUNCVvZc4-BKLB6aBEOT8ILqjpIbE-9sdl94Ok)\n\n### Yet more respackopts!\nThere are now options for Vegetation, and Fences:\n\n![respackopts](https://private-user-images.githubusercontent.com/78741736/528962765-e5d20581-bec8-4adc-9f1d-e0ad18733c62.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..DUOQOO4mUvPbNZbDPfHccYKFCkTGHhNy5erEHGqctQY)\n\n(closes #55 and #57)\n\n### More vegatation\nI've added and fixed some of the new vegetation blocks:\n\n![bushes](https://private-user-images.githubusercontent.com/78741736/528962871-a898570b-f37e-411f-ab31-4d7c5cabd627.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..17WjeBp7YF9I5GWTWe2dNY4co36gioOm6dgH7xxbIdI)\n\nNote for EMF users:\nThe inside of the ender chest is currently broken and only displays a black texture.\nI don't have the slightest clue why that is the case since it worked just fine in the previous release of EMF / ETF.\n\n**Full Changelog**: https://github.com/FabianMPunkt/Nautilus3D/compare/V2.4.1...V2.5",
