          "featured": false,
          "name": "Subtle Effects (Fabric) 1.21.11-1.14.0",
          "version_number": "1.14.0",
          "changelog": "### Additions\n- Added poof effects and an egg crack sound when using a spawn egg.\n- Added powdered snow block place sounds when using a bucket of powdered snow.\n- Added sparks to when a magma cube lands on the ground.\n- Added sparks and sounds to monster spawners.\n\n### Changes\n- Changed snow golem step sounds to be snow sounds rather than being based on the block they are standing on.\n- Updated Korean translation (Thanks [bin0213](https://www.curseforge.com/members/bin0213))\n- Made Prometheus and Dyed Flames support resource driven. Allowing resource packs to customize the entity burning effects for custom fire types.\n- Changed how Spark Providers handle colors. If you're using the 'default' or 'soul' color presets, those will no longer work. I will be updating the wiki soon.\n- Splashes have nearly been completely rewritten, allowing for resource driven textures and colors.\n- Bucket interaction particle colors are now resource driven.\n- Changed monster spawner particles to be a purple-ish color based on the eyes in the block texture. This feature is disabled by default, if this is something that people really like, it may become enabled by default in the future.\n- Updated the mod's birthday notification chat message.\n- Tweaked how item rarity particles determine their color. ([#193](https://github.com/MincraftEinstein/SubtleEffects/issues/193)) (Thanks [Artyrian](https://github.com/TheArtyrian))\n\n### Fixes\n- (1.21.1) Fixed minecarts not spawning splashes (can't be fixed for 1.20.1).\n- Fixed the Particle Effects mod overriding lingering potion effects rather than working with Subtle Effects. ([#209](https://github.com/MincraftEinstein/SubtleEffects/issues/209))\n- (1.20.1) Possibly fixed the sleeping sounds crash on Forge. ([#208](https://github.com/MincraftEinstein/SubtleEffects/issues/208))\n- Fixed all water effects not properly getting biome water colors, causing biome blending colors and resource pack modified colors to be ignored.\n- Fixed splashes sometimes scaling to absurdly large sizes. ([#200](https://github.com/MincraftEinstein/SubtleEffects/issues/200))\n- (1.20.1) Fixed Earthen Clay blocks from Immersive Weathering making a lot of drip splashing sounds when directly over water ([#183](https://github.com/MincraftEinstein/SubtleEffects/issues/183))\n- (1.20.1) Possible fix for [#146](https://github.com/MincraftEinstein/SubtleEffects/issues/146) again\n- (1.20.1) Fixed splash particles not rendering with shaders ([#196](https://github.com/MincraftEinstein/SubtleEffects/issues/196))\n- (1.20.1) Fixed Forge crash with Optifine. Please note that Optifine issues will have little to no support. ([#190](https://github.com/MincraftEinstein/SubtleEffects/issues/190))\n- (1.21.11) Fixed crash with Dyed Flames. ([#185](https://github.com/MincraftEinstein/SubtleEffects/issues/185))\n- Fixed the splash effects from Particular causing the game to crash ([#168](https://github.com/MincraftEinstein/SubtleEffects/issues/168))\n",
