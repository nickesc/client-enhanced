          "project_id": "ccKDOlHs",
          "author_id": "qGOpk8Hs",
          "featured": false,
          "name": "[1.21.11] oωo - 0.13.0",
          "version_number": "0.13.0+1.21.11",
          "changelog": "## API Renamings\nIn preparation for future unobfuscated versions of the game, owo-lib is now developed using the official Mojang Mappings and relevant API elements have been renamed accordingly. Besides a number of straight-forward adaptations (like `World` -> `Level`), this also meant that **the core class of owo-ui (previously `Component`) had to be renamed to `UIComponent`** to avoid a name collision with `net.minecraft.network.chat.Component`. Related classes follow suit, e.g. `ParentComponent` -> `ParentUIComponent`, `Containers` -> `UIContainers`.\n\n## Language Extensions\nIn addition to Rich Translations, owo-lib now supports nested language files which help to greatly reduce repetition in language keys. Additionally, to reduce conflict potential, **all of owo's language extensions are now opt-in**. Check out the relevant [section of the docs](https://docs.wispforest.io/owo/data-extensions/nested-lang).\n\n## JSON5 Support\nThe majority of JSON files in any data/resource pack can be converted to use JSON5 when owo-lib is configured to read and convert them to JSON on-the-fly. Once again, check out [the docs](https://docs.wispforest.io/owo/data-extensions/json5).\n\n## braid UI framework\nDue to unforeseen technical circumstances (I did not want to remap the entire library twice), this build includes an early pre-alpha version of the upcoming braid UI framework. While reasonably well-tested and somewhat mature feature-wise, we do not consider it ready for release and we make *absolutely no guarantees about API stability*.\n\nIf you want to try it out or toy around with it anyways, check out the [getting started guide](https://docs.wispforest.io/braid/getting-started). We'd love to get some early feedback!",
          "changelog_url": null,
          "date_published": "2026-01-31T22:46:24.444719Z",
